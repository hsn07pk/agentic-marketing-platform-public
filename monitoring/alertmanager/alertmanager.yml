global:
  resolve_timeout: 5m

route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 1m
      repeat_interval: 4h

    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 5m
      repeat_interval: 12h

    - match:
        job: postgres
      receiver: 'database-alerts'

    - match_re:
        alertname: ^(HighTokenSpend|CampaignBudgetExceeded|LowCacheHitRate)$
      receiver: 'cost-alerts'

    - match_re:
        alertname: ^(SafetyViolations|GoldenTestFailure|HighHumanReviewRate)$
      receiver: 'governance-alerts'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  - source_match:
      alertname: 'ContainerDown'
    target_match_re:
      alertname: '^Container.*'
    equal: ['name']

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'info-alerts'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'database-alerts'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'cost-alerts'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'governance-alerts'
    webhook_configs:
      - url: 'http://api:8000/api/v1/alerts/webhook'
        send_resolved: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'
