# pytest.ini
[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    golden: Golden test suite

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
    -p no:warnings

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning